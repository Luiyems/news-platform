<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>News Platform</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="header">
    <h1 class="logo">NEWS PLATFORM</h1>
    <p class="date" id="current-date"></p>
</header>

<nav class="nav">

    <input 
        type="text" 
        id="search-input" 
        placeholder="Buscar noticias..." 
        aria-label="Buscar noticias"
    >

    <select id="categoria-select" aria-label="Filtrar por categoría">
        <option value="all">Todas</option>
        <option value="1">Política</option>
        <option value="2">Economía</option>
        <option value="3">Deportes</option>
        <option value="4">Actualidad</option>
        <option value="5">Tecnología</option>
    </select>

    <!-- ACCESIBILIDAD -->
    <div class="accessibility-controls">
        <button id="increase-font">A+</button>
        <button id="decrease-font">A-</button>
        <button id="high-contrast">Contraste</button>
    </div>

</nav>

<main id="news-container"></main>

<div id="cookie-banner" class="cookie-banner" role="dialog" aria-live="polite">
    
    <p class="cookie-text">
        Este sitio utiliza cookies para mejorar tu experiencia.
    </p>

    <div class="cookie-buttons">
        <button id="accept-cookies">Aceptar</button>
        <button id="reject-cookies">Rechazar</button>
    </div>

</div>

<footer class="footer">
    <p>© 2026 News Platform</p>
    <p>
        <a href="#">Política de privacidad</a> | 
        <a href="#">Política de cookies</a>
    </p>
</footer>

<script src="js/app.js"></script>

</body>
</html>
